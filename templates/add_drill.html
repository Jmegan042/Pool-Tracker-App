<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Drill - Pool Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h2>Add Drill</h2>
        <form method="post">
            <label>Date: <input type="date" name="date" required></label><br>
            <label>Drill Name: <input type="text" name="drill_name" required></label><br>
            <label>Balls Made: <input type="number" name="balls_made" min="0" value="0" required></label><br>
            <label>Balls Missed: <input type="number" name="balls_missed" min="0" value="0" required></label><br>
            <button type="submit">Add Drill</button>
        </form>
        <a href="{{ url_for('dashboard') }}">Back to Dashboard</a>
    </div>
</body>
</html>
